# The lib-name is overridden within the code.
lib-name = "This Will Be Ignored For Testing Purposes (Check src/lib.rs)"
unsafe_references_in_callbacks = true

[kotlin]
domain = "dev.diplomattest"
dylib-name = "diplomat_feature_tests"

[dotnet]
# lib-name in src/lib.rs is a deliberately-messy test value; pin a clean
# C# namespace and the real cdylib name (the crate builds
# `libdiplomat_feature_tests`) so the generated bindings compile and load.
namespace = "Somelib"
dylib-name = "diplomat_feature_tests"

[demo-gen]
relative-js-path = "../../js/api/"